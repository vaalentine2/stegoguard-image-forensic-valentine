name: StegoGuard Image Forensics

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  image-forensics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create demo image
        run: python make_demo_image.py

      - name: Run StegoGuard scanner
        run: python scanner.py
